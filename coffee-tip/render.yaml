services:
  - type: web
    name: coffee-tip
    env: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /health
    envVars:
      - key: BAKONG_API_TOKEN
        sync: false
      - key: BAKONG_ACCOUNT
        sync: false
      - key: MERCHANT_NAME
        sync: false
      - key: MERCHANT_CITY
        value: Phnom Penh
      - key: PORT
        value: 3000
